    <div class="container finance-test-container">
        <h1>재테크 성향 테스트 💹</h1>
        <p>아래 5문항을 선택하고 내 재테크 타입을 확인해보세요.</p>

        <form id="finance-test-form" class="quiz-form">
            <div class="quiz-question">
                <h3>1. 월급이 들어오면 가장 먼저 하는 일은?</h3>
                <label><input type="radio" name="q1" value="5"> 투자/저축 비중을 먼저 배분한다</label>
                <label><input type="radio" name="q1" value="3"> 생활비와 저축을 반반으로 챙긴다</label>
                <label><input type="radio" name="q1" value="1"> 당장 필요한 소비부터 처리한다</label>
            </div>

            <div class="quiz-question">
                <h3>2. 손실이 발생한 투자 상품을 보면?</h3>
                <label><input type="radio" name="q2" value="5"> 원칙대로 대응하고 분할 매수/매도한다</label>
                <label><input type="radio" name="q2" value="3"> 상황을 보며 천천히 대응한다</label>
                <label><input type="radio" name="q2" value="1"> 불안해서 바로 정리하는 편이다</label>
            </div>

            <div class="quiz-question">
                <h3>3. 비상자금(현금성 자산)은 어느 정도 준비했나요?</h3>
                <label><input type="radio" name="q3" value="5"> 6개월 이상 생활비를 확보했다</label>
                <label><input type="radio" name="q3" value="3"> 3개월 정도는 확보했다</label>
                <label><input type="radio" name="q3" value="1"> 아직 거의 준비하지 못했다</label>
            </div>

            <div class="quiz-question">
                <h3>4. 새로운 투자 정보를 접하면?</h3>
                <label><input type="radio" name="q4" value="5"> 자료를 찾아보고 기준에 맞으면 실행한다</label>
                <label><input type="radio" name="q4" value="3"> 지인/전문가 의견을 듣고 결정한다</label>
                <label><input type="radio" name="q4" value="1"> 복잡해서 일단 미루는 편이다</label>
            </div>

            <div class="quiz-question">
                <h3>5. 당신의 투자 목표 기간은?</h3>
                <label><input type="radio" name="q5" value="5"> 5년 이상 장기 목표 중심</label>
                <label><input type="radio" name="q5" value="3"> 2~5년 중기 목표 중심</label>
                <label><input type="radio" name="q5" value="1"> 1년 이내 단기 목표 중심</label>
            </div>

            <button type="submit" class="submit-button">결과 보기</button>
        </form>

        <div id="finance-result" class="finance-result-box" style="display:none;">
            <h2 id="finance-result-title"></h2>
            <p id="finance-result-text"></p>
            <p id="finance-result-tip" class="finance-result-tip"></p>
